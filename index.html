<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スカウト文生成ツール</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #F7F7F5;
    color: #1C1C1C;
    min-height: 100vh;
    padding: 48px 20px;
  }

  .wrap {
    max-width: 680px;
    margin: 0 auto;
  }

  .header {
    margin-bottom: 40px;
  }

  .header h1 {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header p {
    font-size: 13px;
    color: #888;
    margin-top: 6px;
    font-weight: 300;
  }

  .section {
    margin-bottom: 28px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #999;
    margin-bottom: 12px;
    font-family: 'DM Mono', monospace;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .field label {
    font-size: 12px;
    color: #666;
    font-weight: 500;
  }

  .field input,
  .field textarea {
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    border: 1px solid #DDDDD8;
    border-radius: 4px;
    background: #fff;
    color: #1C1C1C;
    outline: none;
    transition: border-color 0.15s;
  }

  .field input:focus,
  .field textarea:focus {
    border-color: #1C1C1C;
  }

  .field textarea {
    min-height: 160px;
    resize: vertical;
    line-height: 1.75;
  }

  .apikey-row {
    position: relative;
  }

  .apikey-row input {
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding-right: 64px;
  }

  .show-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: #999;
    background: none;
    border: none;
    cursor: pointer;
    padding: 2px 0;
  }

  .show-btn:hover { color: #333; }

  .divider {
    height: 1px;
    background: #E8E8E4;
    margin: 28px 0;
  }

  .generate-btn {
    width: 100%;
    padding: 14px;
    background: #1C1C1C;
    color: #fff;
    border: none;
    border-radius: 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    transition: background 0.15s;
  }

  .generate-btn:hover:not(:disabled) { background: #333; }
  .generate-btn:disabled { opacity: 0.45; cursor: not-allowed; }

  .spinner {
    display: none;
    width: 16px;
    height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .error-box {
    display: none;
    margin-top: 14px;
    padding: 12px 16px;
    background: #FFF2F2;
    border: 1px solid #FFCDD2;
    border-radius: 4px;
    font-size: 13px;
    color: #B71C1C;
  }

  .error-box.show { display: block; }

  .result-card {
    display: none;
    margin-top: 28px;
    background: #fff;
    border: 1px solid #DDDDD8;
    border-radius: 4px;
    overflow: hidden;
  }

  .result-card.show { display: block; }

  .result-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid #EBEBEB;
    background: #FAFAF8;
  }

  .result-topbar span {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: #999;
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  .copy-btn {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    color: #666;
    background: none;
    border: 1px solid #DDD;
    border-radius: 3px;
    padding: 4px 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 1px;
  }

  .copy-btn:hover { border-color: #999; color: #333; }
  .copy-btn.ok { border-color: #4CAF50; color: #388E3C; }

  .result-body {
    padding: 22px;
    font-size: 14px;
    line-height: 1.85;
    white-space: pre-wrap;
    word-break: break-word;
    color: #1C1C1C;
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="header">
    <h1>スカウト文 生成ツール</h1>
    <p>候補者のプロフィールを貼り付けて、AIがスカウト文を自動生成します。</p>
  </div>

  <div class="section">
    <div class="section-label">送信者情報</div>
    <div class="grid-2">
      <div class="field">
        <label>会社名</label>
        <input type="text" id="company" placeholder="例：株式会社〇〇" />
      </div>
      <div class="field">
        <label>担当者名</label>
        <input type="text" id="recruiter" placeholder="例：山田 花子" />
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-label">API設定</div>
    <div class="field">
      <label>Claude API キー</label>
      <div class="apikey-row">
        <input type="password" id="apikey" placeholder="sk-ant-..." />
        <button class="show-btn" onclick="toggleKey()">表示</button>
      </div>
    </div>
  </div>

  <div class="divider"></div>

  <div class="section">
    <div class="section-label">候補者プロフィール</div>
    <div class="field">
      <label>Greenからコピーしたプロフィールを貼り付けてください</label>
      <textarea id="profile" placeholder="例：
氏名：田中 太郎
年齢：28歳
現職：Webエンジニア（3年）
スキル：Python、React、AWS
希望：フルスタックエンジニアとして成長したい"></textarea>
    </div>
  </div>

  <button class="generate-btn" id="genBtn" onclick="generate()">
    <div class="spinner" id="spinner"></div>
    <span id="btnLabel">スカウト文を生成する</span>
  </button>

  <div class="error-box" id="errBox"></div>

  <div class="result-card" id="resultCard">
    <div class="result-topbar">
      <span>生成結果</span>
      <button class="copy-btn" id="copyBtn" onclick="copyText()">COPY</button>
    </div>
    <div class="result-body" id="resultBody"></div>
  </div>

</div>
<script>
  // ページ読み込み時にAPIキーを復元
  window.onload = function() {
    const saved = localStorage.getItem('scout_apikey');
    if (saved) document.getElementById('apikey').value = saved;
  };

  function toggleKey() {
    const el = document.getElementById('apikey');
    const btn = document.querySelector('.show-btn');
    el.type = el.type === 'password' ? 'text' : 'password';
    btn.textContent = el.type === 'password' ? '表示' : '隠す';
  }

  async function generate() {
    const apikey    = document.getElementById('apikey').value.trim();
    const company   = document.getElementById('company').value.trim();
    const recruiter = document.getElementById('recruiter').value.trim();
    const profile   = document.getElementById('profile').value.trim();

    hideErr(); hideResult();

    if (!apikey)    return showErr('APIキーを入力してください。');
    if (!company)   return showErr('会社名を入力してください。');
    if (!recruiter) return showErr('担当者名を入力してください。');
    if (!profile)   return showErr('候補者プロフィールを入力してください。');

    // APIキーを保存
    localStorage.setItem('scout_apikey', apikey);

    setLoading(true);

    try {
      const res = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apikey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 1024,
          messages: [{
            role: 'user',
            content: `あなたは採用のプロです。
以下の候補者プロフィールを読んで、その人に合ったスカウトメッセージを作成してください。

【送信者情報】
会社名：${company}
担当者名：${recruiter}

【候補者プロフィール】
${profile}

【条件】
・件名も含めて作成してください
・300〜400文字程度
・候補者のスキルや経験に具体的に触れること
・押しつけがましくない自然な文体で
・カジュアル面談への誘導で締めること
・署名は「${company}　採用担当　${recruiter}」の形式で`
          }]
        })
      });

      if (!res.ok) {
        const e = await res.json();
        throw new Error(e.error?.message || `APIエラー (${res.status})`);
      }

      const data = await res.json();
      showResult(data.content[0].text);

    } catch(e) {
      showErr('エラーが発生しました：' + e.message);
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    document.getElementById('genBtn').disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('btnLabel').textContent = on ? '生成中...' : 'スカウト文を生成する';
  }

  function showResult(text) {
    document.getElementById('resultBody').textContent = text;
    const card = document.getElementById('resultCard');
    card.classList.add('show');
    card.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function hideResult() {
    document.getElementById('resultCard').classList.remove('show');
  }

  function showErr(msg) {
    const b = document.getElementById('errBox');
    b.textContent = msg;
    b.classList.add('show');
  }

  function hideErr() {
    document.getElementById('errBox').classList.remove('show');
  }

  function copyText() {
    const text = document.getElementById('resultBody').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'COPIED ✓';
      btn.classList.add('ok');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('ok'); }, 2000);
    });
  }
</script>
</body>
</html>
